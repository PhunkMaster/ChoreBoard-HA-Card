name: Release

# NOTE: This workflow is deprecated in favor of auto-release.yml
# The auto-release.yml workflow handles version updates and release creation
# when semver branches (feature/X.Y.Z, bugfix/X.Y.Z, etc.) are merged to main.
#
# This workflow is disabled to prevent conflicts. If you need manual release
# creation, use auto-release.yml by merging a semver-named branch.
#
# To re-enable this workflow, uncomment the 'on:' section below.

on:
  workflow_dispatch: # Manual trigger only
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

# Disabled - conflicts with auto-release.yml
# on:
#   release:
#     types: [ published ]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Determine version bump
        id: version_bump
        run: |
          # Use manual input for version bump type
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP"

      - name: Bump version
        id: new_version
        run: |
          # Bump version based on bump type
          npm version ${{ steps.version_bump.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(jq -r .version package.json)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update src/common.ts CARD_VERSION
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          echo "Updating CARD_VERSION in src/common.ts to $NEW_VERSION"
          sed -i 's/export const CARD_VERSION = "[^"]*"/export const CARD_VERSION = "'"$NEW_VERSION"'"/' src/common.ts

          # Verify the change
          grep "CARD_VERSION" src/common.ts

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json src/common.ts
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}"
          git push

      - name: Create Git tag
        run: |
          git tag "v${{ steps.new_version.outputs.version }}"
          git push origin "v${{ steps.new_version.outputs.version }}"

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Create changelog
          CHANGELOG="## What's Changed

          $COMMITS

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${{ steps.new_version.outputs.version }}"

          # Save to file for use in release
          echo "$CHANGELOG" > CHANGELOG.md
          echo "Generated changelog"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: Release v${{ steps.new_version.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            dist/choreboard-ha-card.js
            dist/choreboard-ha-card.js.map
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify release created
        run: |
          echo "✅ Release v${{ steps.new_version.outputs.version }} created successfully!"
          echo "📦 Build artifacts attached to release"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.new_version.outputs.version }}"
